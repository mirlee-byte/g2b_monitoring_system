services:
  g2b-monitor:
    build: .
    image: g2b-monitor:latest
    container_name: g2b-monitor
    restart: unless-stopped          # 호스트 재부팅 후에도 자동 기동
    env_file:
      - .env                          # API 키·Webhook URL 주입 (이미지에 미포함)
    environment:
      - TZ=Asia/Seoul
    logging:                          # 로그 무한 증가 방지
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
